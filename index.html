<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wiki</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 320px;
      border-right: 1px solid #ccc;
      padding: 16px;
      overflow-y: auto;
      box-sizing: border-box;
    }
    #content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      box-sizing: border-box;
      max-width: 1000px;
    }
    a {
      display: block;
      margin: 6px 0;
      color: #0366d6;
      text-decoration: none;
      word-break: break-word;
    }
    a:hover {
      text-decoration: underline;
    }
    pre {
      background: #f4f4f4;
      padding: 12px;
      overflow-x: auto;
    }
    code {
      font-family: Consolas, monospace;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>Files</h2>
    <div id="file-list">Loading...</div>
  </div>

  <div id="content">
    <h1>Wiki</h1>
    <p>Select a markdown file.</p>
  </div>

  <script>
    const fileListEl = document.getElementById("file-list");
    const contentEl = document.getElementById("content");
    const params = new URLSearchParams(location.search);
    const currentFile = params.get("file");

    function loadMarkdown(file) {
      fetch(file)
        .then(r => {
          if (!r.ok) throw new Error("Failed to load");
          return r.text();
        })
        .then(md => {
          contentEl.innerHTML = marked.parse(md);
          document.title = file + " - Wiki";
        })
        .catch(() => {
          contentEl.innerHTML = "<p>Failed to load file.</p>";
        });
    }

    fetch("files.json")
      .then(r => r.json())
      .then(files => {
        fileListEl.innerHTML = "";
        files.forEach(file => {
          const a = document.createElement("a");
          a.href = "?file=" + encodeURIComponent(file);
          a.textContent = file;
          fileListEl.appendChild(a);
        });

        if (currentFile) {
          loadMarkdown(currentFile);
        }
      })
      .catch(() => {
        fileListEl.textContent = "Failed to load files.json";
      });
  </script>
</body>
</html>
